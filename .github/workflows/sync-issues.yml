# .github/workflows/sync-issues.yml
name: Issue 생성/완료 → 노션 작업현황 동기화

on:
  issues:
    types: [opened, closed, labeled, assigned]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 노션 작업현황DB 업데이트
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token   = os.environ['NOTION_API_KEY']
          db_id   = os.environ['NOTION_TASK_DB_ID']
          action  = os.environ['ACTION']
          title   = os.environ['ISSUE_TITLE']
          url     = os.environ['ISSUE_URL']
          number  = os.environ['ISSUE_NUMBER']
          kst     = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d')

          # 상태 매핑
          status_map = {
            'opened':   '🔄 진행중',
            'closed':   '✅ 완료',
            'labeled':  '🔄 진행중',
            'assigned': '🔄 진행중'
          }

          data = {
            "parent": {"database_id": db_id},
            "properties": {
              "제목": {"title": [{"text": {"content": f"#{number} {title}"}}]},
              "상태": {"select": {"name": status_map.get(action, '🆕 접수')}},
              "깃허브 링크": {"url": url},
              "시작일": {"date": {"start": kst}} if action == 'opened' else {},
              "완료일": {"date": {"start": kst}} if action == 'closed' else {}
            }
          }

          # 빈 date 제거
          data["properties"] = {k: v for k, v in data["properties"].items() if v}

          req = urllib.request.Request(
            'https://api.notion.com/v1/pages',
            data=json.dumps(data).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='POST'
          )
          urllib.request.urlopen(req)
          print(f"✅ Issue #{number} → 노션 동기화 완료")
          PYEOF
        env:
          NOTION_API_KEY:    ${{ secrets.NOTION_API_KEY }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          ACTION:            ${{ github.event.action }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
          ISSUE_URL:         ${{ github.event.issue.html_url }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
