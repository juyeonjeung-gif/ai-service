name: 🚀 배포 완료 → 노션 자동 기록

on:
  release:
    types: [published]

jobs:
  sync-release:
    name: 배포이력DB 기록 + 대시보드 상태 갱신
    runs-on: ubuntu-latest

    steps:
      - name: 배포이력DB에 신규 행 추가 + 대시보드 콜아웃 갱신
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          # ─── 환경변수 ───────────────────────────────────────
          token          = os.environ['NOTION_API_KEY']
          deploy_db_id   = os.environ['NOTION_DEPLOY_DB_ID']
          callout_id     = os.environ['NOTION_DASHBOARD_CALLOUT_ID']
          version        = os.environ['VERSION']          # 예: v1.2.0
          release_notes  = os.environ['RELEASE_NOTES']    # Release 본문
          release_url    = os.environ['RELEASE_URL']      # Release 링크
          author         = os.environ['AUTHOR']           # 배포한 사람

          # ─── 한국 시간 ──────────────────────────────────────
          kst_tz   = timezone(timedelta(hours=9))
          now_kst  = datetime.now(kst_tz)
          dt_str   = now_kst.strftime('%Y-%m-%dT%H:%M:%S+09:00')   # DB용
          disp_str = now_kst.strftime('%Y-%m-%d %H:%M')             # 표시용

          # Release 본문 500자 제한 (노션 블록 길이 제한)
          notes_trimmed = release_notes[:500] if release_notes else '내용 없음'

          headers = {
            'Authorization': f'Bearer {token}',
            'Content-Type': 'application/json',
            'Notion-Version': '2022-06-28'
          }

          def notion_request(url, payload, method='POST'):
            req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers=headers,
              method=method
            )
            with urllib.request.urlopen(req) as res:
              return json.loads(res.read().decode())

          # ───────────────────────────────────────────────────
          # STEP 1. 배포이력DB에 신규 행 추가
          # ───────────────────────────────────────────────────
          deploy_payload = {
            "parent": {"database_id": deploy_db_id},
            "properties": {
              "버전": {
                "title": [{"text": {"content": version}}]
              },
              "배포일시": {
                "date": {"start": dt_str}
              },
              "상태": {
                "select": {"name": "✅ 정상"}
              },
              "주요 변경사항": {
                "rich_text": [{"text": {"content": notes_trimmed}}]
              },
              "깃허브 링크": {
                "url": release_url
              }
            }
          }

          notion_request('https://api.notion.com/v1/pages', deploy_payload)
          print(f"✅ STEP 1 완료 — 배포이력DB에 {version} 행 추가됨")

          # ───────────────────────────────────────────────────
          # STEP 2. 대시보드 콜아웃 블록 내용 갱신
          # ───────────────────────────────────────────────────
          callout_payload = {
            "callout": {
              "rich_text": [
                {
                  "type": "text",
                  "text": {
                    "content": (
                      f"✅ 시스템 정상 운영 중\n"
                      f"최근 배포: {version}  |  {disp_str} (KST)  |  배포자: {author}\n"
                      f"변경사항: {notes_trimmed[:100]}{'...' if len(notes_trimmed) > 100 else ''}"
                    ),
                    "link": {"url": release_url}
                  }
                }
              ],
              "icon": {"emoji": "✅"},
              "color": "green_background"
            }
          }

          notion_request(
            f'https://api.notion.com/v1/blocks/{callout_id}',
            callout_payload,
            method='PATCH'
          )
          print(f"✅ STEP 2 완료 — 대시보드 콜아웃 갱신됨 ({version} / {disp_str})")

          print("\n🎉 모든 노션 업데이트 완료")
          PYEOF
        env:
          NOTION_API_KEY:                ${{ secrets.NOTION_API_KEY }}
          NOTION_DEPLOY_DB_ID:           ${{ secrets.NOTION_DEPLOY_DB_ID }}
          NOTION_DASHBOARD_CALLOUT_ID:   ${{ secrets.NOTION_DASHBOARD_CALLOUT_ID }}
          VERSION:                       ${{ github.event.release.tag_name }}
          RELEASE_NOTES:                 ${{ github.event.release.body }}
          RELEASE_URL:                   ${{ github.event.release.html_url }}
          AUTHOR:                        ${{ github.event.release.author.login }}
