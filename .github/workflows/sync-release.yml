# .github/workflows/sync-release.yml
name: 배포 완료 → 노션 배포이력 기록

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 노션 배포이력DB에 기록
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token   = os.environ['NOTION_API_KEY']
          db_id   = os.environ['NOTION_DEPLOY_DB_ID']
          version = os.environ['VERSION']
          notes   = os.environ['RELEASE_NOTES'][:500]
          url     = os.environ['RELEASE_URL']
          kst     = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%dT%H:%M:%S+09:00')

          data = {
            "parent": {"database_id": db_id},
            "properties": {
              "버전":        {"title": [{"text": {"content": version}}]},
              "배포일시":    {"date": {"start": kst}},
              "상태":        {"select": {"name": "✅ 정상"}},
              "주요 변경사항": {"rich_text": [{"text": {"content": notes}}]},
              "깃허브 링크": {"url": url}
            }
          }

          req = urllib.request.Request(
            'https://api.notion.com/v1/pages',
            data=json.dumps(data).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='POST'
          )
          urllib.request.urlopen(req)
          print(f"✅ {version} 배포이력 → 노션 기록 완료")
          PYEOF
        env:
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_DEPLOY_DB_ID: ${{ secrets.NOTION_DEPLOY_DB_ID }}
          VERSION:             ${{ github.event.release.tag_name }}
          RELEASE_NOTES:       ${{ github.event.release.body }}
          RELEASE_URL:         ${{ github.event.release.html_url }}
