name: Initialize Build Status in Notion

# 설계 문서(ERD / API 명세)가 feature/** 브랜치에 push될 때 실행
# - 노션 구축현황 DB에 서비스 페이지가 없으면 신규 생성
# - 이미 존재하면 스킵 (idempotent)

on:
  push:
    branches:
      - "feature/**"
    paths:
      - "**/docs/erd/*.md"
      - "**/docs/api/*.md"

jobs:
  init-build-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Initialize build status page in Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          GH_BRANCH:      ${{ github.ref_name }}
          GH_BRANCH_URL:  "https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}"
        run: python .github/scripts/init_build_status.py
