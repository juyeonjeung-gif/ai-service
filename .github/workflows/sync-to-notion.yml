name: 📋 문서 변경 시 노션 자동 업데이트

on:
  push:
    paths:
      - 'docs/erd/**'
      - 'docs/api/**'
    branches: [main]

jobs:

  # ─────────────────────────────────────
  # ERD 파일이 바뀌었을 때 → 노션 ERD 페이지 업데이트
  # ─────────────────────────────────────
  sync-erd:
    name: ERD 변경 감지 → 노션 업데이트
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'docs/erd/') ||
      contains(toJson(github.event.commits.*.added), 'docs/erd/')

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 노션 ERD 페이지에 변경 내용 기록
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token    = os.environ['NOTION_API_KEY']
          page_id  = os.environ['NOTION_ERD_PAGE_ID']
          msg      = os.environ['COMMIT_MSG']
          url      = os.environ['COMMIT_URL']
          author   = os.environ['AUTHOR']

          # 한국 시간으로 변환
          kst = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d %H:%M')

          with open('docs/erd/erd.md', 'r', encoding='utf-8') as f:
              content = f.read()[:1900]   # 노션 블록 2000자 제한

          payload = {
            "children": [
              {"type": "divider", "divider": {}},
              {
                "type": "callout",
                "callout": {
                  "rich_text": [{
                    "type": "text",
                    "text": {
                      "content": f"📊 ERD 업데이트  |  {kst} (KST)\n👤 작성자: {author}\n📝 변경내용: {msg}",
                      "link": {"url": url}
                    }
                  }],
                  "icon": {"emoji": "🔄"},
                  "color": "blue_background"
                }
              },
              {
                "type": "code",
                "code": {
                  "rich_text": [{"type": "text", "text": {"content": content}}],
                  "language": "markdown"
                }
              }
            ]
          }

          req = urllib.request.Request(
            f'https://api.notion.com/v1/blocks/{page_id}/children',
            data=json.dumps(payload).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='PATCH'
          )
          urllib.request.urlopen(req)
          print("✅ 노션 ERD 페이지 업데이트 완료")
          PYEOF
        env:
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_ERD_PAGE_ID:  ${{ secrets.NOTION_ERD_PAGE_ID }}
          COMMIT_MSG:          ${{ github.event.commits[0].message }}
          COMMIT_URL:          ${{ github.event.commits[0].url }}
          AUTHOR:              ${{ github.event.commits[0].author.name }}

  # ─────────────────────────────────────
  # API 파일이 바뀌었을 때 → 노션 API 명세 페이지 업데이트
  # ─────────────────────────────────────
  sync-api:
    name: API 명세 변경 감지 → 노션 업데이트
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'docs/api/') ||
      contains(toJson(github.event.commits.*.added), 'docs/api/')

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 노션 API 명세 페이지에 변경 내용 기록
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token    = os.environ['NOTION_API_KEY']
          page_id  = os.environ['NOTION_API_PAGE_ID']
          msg      = os.environ['COMMIT_MSG']
          url      = os.environ['COMMIT_URL']
          author   = os.environ['AUTHOR']

          kst = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d %H:%M')

          with open('docs/api/CHANGELOG.md', 'r', encoding='utf-8') as f:
              changelog = f.read()[:1900]

          payload = {
            "children": [
              {"type": "divider", "divider": {}},
              {
                "type": "callout",
                "callout": {
                  "rich_text": [{
                    "type": "text",
                    "text": {
                      "content": f"🔌 API 명세 업데이트  |  {kst} (KST)\n👤 작성자: {author}\n📝 변경내용: {msg}",
                      "link": {"url": url}
                    }
                  }],
                  "icon": {"emoji": "🔄"},
                  "color": "green_background"
                }
              },
              {
                "type": "code",
                "code": {
                  "rich_text": [{"type": "text", "text": {"content": changelog}}],
                  "language": "markdown"
                }
              }
            ]
          }

          req = urllib.request.Request(
            f'https://api.notion.com/v1/blocks/{page_id}/children',
            data=json.dumps(payload).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='PATCH'
          )
          urllib.request.urlopen(req)
          print("✅ 노션 API 명세 페이지 업데이트 완료")
          PYEOF
        env:
          NOTION_API_KEY:       ${{ secrets.NOTION_API_KEY }}
          NOTION_API_PAGE_ID:   ${{ secrets.NOTION_API_PAGE_ID }}
          COMMIT_MSG:           ${{ github.event.commits[0].message }}
          COMMIT_URL:           ${{ github.event.commits[0].url }}
          AUTHOR:               ${{ github.event.commits[0].author.name }}
