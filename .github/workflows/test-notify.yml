## 5. 추가할 깃허브 시크릿 목록 (완전판)

지금까지 나온 모든 자동화를 합치면 총 5개의 시크릿이 필요합니다.

| 시크릿 이름 | 값 | 어디서 |
|---|---|---|
| `NOTION_API_KEY` | `secret_xxxxx` | 노션 통합 페이지 |
| `NOTION_ERD_PAGE_ID` | 32자리 | 2-3.ERD 페이지 URL |
| `NOTION_API_PAGE_ID` | 32자리 | 2-4.API명세 페이지 URL |
| `NOTION_TASK_DB_ID` | 32자리 | 작업현황DB URL |
| `NOTION_DEPLOY_DB_ID` | 32자리 | 배포이력DB URL |

