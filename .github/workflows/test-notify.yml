# .github/workflows/test-notify.yml
name: 테스트 결과 → 노션 알림

on:
  push:
    branches: [main, develop]

jobs:
  test-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 테스트 실행
        id: run_test
        run: |
          # 실제 테스트 명령어로 교체하세요 (예: npm test, pytest 등)
          echo "테스트 실행 중..."
          exit 0   # 0=성공, 1=실패
        continue-on-error: true

      - name: 결과 → 노션 작업현황DB 기록
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token     = os.environ['NOTION_API_KEY']
          db_id     = os.environ['NOTION_TASK_DB_ID']
          outcome   = os.environ['TEST_OUTCOME']   # success / failure
          branch    = os.environ['BRANCH']
          commit    = os.environ['COMMIT_MSG']
          run_url   = os.environ['RUN_URL']
          kst       = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d %H:%M')

          is_ok     = outcome == 'success'
          emoji     = '✅' if is_ok else '❌'
          status    = '✅ 완료' if is_ok else '❌ 보류'
          title     = f"{emoji} [{branch}] 테스트 {'통과' if is_ok else '실패'} — {kst}"

          data = {
            "parent": {"database_id": db_id},
            "properties": {
              "제목":        {"title": [{"text": {"content": title}}]},
              "상태":        {"select": {"name": status}},
              "타입":        {"select": {"name": "테스트"}},
              "깃허브 링크": {"url": run_url},
              "비개발 메모": {"rich_text": [{"text": {"content":
                f"커밋 내용: {commit}\n{'문제 없음' if is_ok else '⚠️ 개발팀 확인 필요'}"
              }}]}
            }
          }

          req = urllib.request.Request(
            'https://api.notion.com/v1/pages',
            data=json.dumps(data).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='POST'
          )
          urllib.request.urlopen(req)
          print(f"✅ 테스트 결과 → 노션 기록 완료")
          PYEOF
        env:
          NOTION_API_KEY:    ${{ secrets.NOTION_API_KEY }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          TEST_OUTCOME:      ${{ steps.run_test.outcome }}
          BRANCH:            ${{ github.ref_name }}
          COMMIT_MSG:        ${{ github.event.commits[0].message }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
