name: 🧪 테스트 결과 → 노션 작업현황DB 기록

on:
  push:
    branches: [main, develop]

jobs:
  test-and-notify:
    name: 결과 → 노션 작업현황DB 기록
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 테스트 실행
        id: run_test
        run: |
          # ⚠️ 실제 테스트 명령어로 나중에 교체하세요
          # 예: npm test / pytest / python -m unittest 등
          # 지금은 항상 성공으로 처리
          echo "테스트 통과 (테스트 코드 미작성 상태)"
          exit 0
        continue-on-error: true

      - name: 결과 → 노션 작업현황DB 기록
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token    = os.environ['NOTION_API_KEY']
          db_id    = os.environ['NOTION_TASK_DB_ID']
          outcome  = os.environ['TEST_OUTCOME']    # success / failure
          branch   = os.environ['BRANCH']
          commit   = os.environ['COMMIT_MSG']
          run_url  = os.environ['RUN_URL']

          kst     = timezone(timedelta(hours=9))
          now_kst = datetime.now(kst)
          disp    = now_kst.strftime('%Y-%m-%d %H:%M')
          date_str= now_kst.strftime('%Y-%m-%d')

          is_ok   = (outcome == 'success')
          emoji   = '✅' if is_ok else '❌'
          status  = '✅ 완료' if is_ok else '❌ 보류'
          title   = f"{emoji} [{branch}] 테스트 {'통과' if is_ok else '실패'}  —  {disp}"
          memo    = f"커밋: {commit}\n{'정상 처리됨' if is_ok else '⚠️ 개발팀 확인 필요'}"

          headers = {
            'Authorization': f'Bearer {token}',
            'Content-Type': 'application/json',
            'Notion-Version': '2022-06-28'
          }

          # 노션에 전달할 속성
          # ⚠️ 컬럼 타입을 모두 Text/Select/Date/URL로만 구성
          #    Person 타입은 API로 자동 입력 불가 → Text로 대체
          payload = {
            "parent": {"database_id": db_id},
            "properties": {
              "제목": {
                "title": [{"text": {"content": title}}]
              },
              "상태": {
                "select": {"name": status}
              },
              "타입": {
                "select": {"name": "테스트"}
              },
              "시작일": {
                "date": {"start": date_str}
              },
              "깃허브 링크": {
                "url": run_url
              },
              "비개발 메모": {
                "rich_text": [{"text": {"content": memo}}]
              }
            }
          }

          req = urllib.request.Request(
            'https://api.notion.com/v1/pages',
            data=json.dumps(payload).encode(),
            headers=headers,
            method='POST'
          )

          try:
            with urllib.request.urlopen(req) as res:
              print(f"✅ 노션 작업현황DB 기록 완료 — {title}")
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ 노션 API 오류 {e.code}: {body}")
            raise

          PYEOF
        env:
          NOTION_API_KEY:    ${{ secrets.NOTION_API_KEY }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          TEST_OUTCOME:      ${{ steps.run_test.outcome }}
          BRANCH:            ${{ github.ref_name }}
          COMMIT_MSG:        ${{ github.event.head_commit.message }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
