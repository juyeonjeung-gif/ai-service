# .github/workflows/test-notify.yml
name: 테스트 결과 → 노션 알림

on:
  push:
    branches: [main, develop]

jobs:
  test-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 테스트 실행
        id: run_test
        run: |
          # 실제 테스트 명령어로 교체하세요 (예: npm test, pytest 등)
          echo "테스트 실행 중..."
          exit 0   # 0=성공, 1=실패
        continue-on-error: true

      - name: 결과 → 노션 작업현황DB 기록
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta

          token     = os.environ['NOTION_API_KEY']
          db_id     = os.environ['NOTION_TASK_DB_ID']
          outcome   = os.environ['TEST_OUTCOME']   # success / failure
          branch    = os.environ['BRANCH']
          commit    = os.environ['COMMIT_MSG']
          run_url   = os.environ['RUN_URL']
          kst       = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d %H:%M')

          is_ok     = outcome == 'success'
          emoji     = '✅' if is_ok else '❌'
          status    = '✅ 완료' if is_ok else '❌ 보류'
          title     = f"{emoji} [{branch}] 테스트 {'통과' if is_ok else '실패'} — {kst}"

          data = {
            "parent": {"database_id": db_id},
            "properties": {
              "제목":        {"title": [{"text": {"content": title}}]},
              "상태":        {"select": {"name": status}},
              "타입":        {"select": {"name": "테스트"}},
              "깃허브 링크": {"url": run_url},
              "비개발 메모": {"rich_text": [{"text": {"content":
                f"커밋 내용: {commit}\n{'문제 없음' if is_ok else '⚠️ 개발팀 확인 필요'}"
              }}]}
            }
          }

          req = urllib.request.Request(
            'https://api.notion.com/v1/pages',
            data=json.dumps(data).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='POST'
          )
          urllib.request.urlopen(req)
          print(f"✅ 테스트 결과 → 노션 기록 완료")
          PYEOF
        env:
          NOTION_API_KEY:    ${{ secrets.NOTION_API_KEY }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          TEST_OUTCOME:      ${{ steps.run_test.outcome }}
          BRANCH:            ${{ github.ref_name }}
          COMMIT_MSG:        ${{ github.event.commits[0].message }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
```

---

## 4. 역할별 일상 워크플로우

### 개발자의 하루
```
① 아침: 깃허브 Issues에서 오늘 할 작업 확인
         → 노션 작업현황DB에 자동으로 반영되어 있음

② 작업: 코드 작성 → 깃허브에 저장(push)
         → 테스트 자동 실행 → 결과 노션에 자동 기록

③ ERD/API 변경 필요 시:
         docs/erd/erd.md 또는 docs/api/ 파일 수정
         → 노션 설계 페이지에 자동 반영

④ 작업 완료: Issue 닫기
         → 노션 작업현황DB 상태 자동 → ✅ 완료

⑤ 배포: Release 생성
         → 노션 배포이력DB에 자동 행 추가
```

### 비개발 인력의 하루
```
① 아침: 노션 대시보드 열기
         → 어젯밤 자동 업데이트된 현황 확인
         → ❌ 있으면 클로드에게 "이게 무슨 문제야?" 질문

② 궁금한 게 생기면: 클로드에게 물어보기
         "이번 주 완료된 작업 요약해줘"
         "v1.2.0에서 뭐가 바뀐 건지 쉽게 설명해줘"
         "지금 진행 중인 작업이 언제 끝날 것 같아?"

③ 요청 사항 생기면: 노션 작업현황DB에 직접 행 추가
         또는 클로드에게 "깃허브에 이슈 만들어줘" 지시

④ 설계 변경이 필요하면:
         노션 설계DB에 코멘트 남기기
         → 클로드에게 "이 내용으로 ERD 업데이트해줘" 지시
```

### 클로드 에이전트의 역할
```
비개발 인력 ←──→ 클로드 ←──→ 깃허브
  (자연어)    번역/실행   (기술적 작업)

예시:
"로그인할 때 소셜 로그인도 되게 해줘" (비개발)
  → 클로드가 깃허브 Issue 생성
  → ERD에 oauth_accounts 테이블 추가
  → API 명세에 /auth/oauth 엔드포인트 추가
  → 노션에 작업 기록
```

