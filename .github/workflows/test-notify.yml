## 6. 최종 완성 후 파일 구조
```
ai-service/
├── docs/
│   ├── erd/
│   │   └── erd.md
│   └── api/
│       ├── openapi.yaml
│       └── CHANGELOG.md
├── src/                        ← 개발팀이 채워나갈 코드
├── .github/
│   └── workflows/
│       ├── sync-to-notion.yml  ← 문서 변경 동기화 (이미 완성)
│       ├── sync-issues.yml     ← Issue 동기화 (신규)
│       ├── sync-release.yml    ← 배포 이력 동기화 (신규)
│       └── test-notify.yml     ← 테스트 결과 알림 (신규)
└── README.md
