openapi: 3.0.0
info:
  title: AI 서비스 API 명세
  version: 1.0.0
  description: |
    ## 📖 비개발 인력을 위한 설명

    **API란?**
    앱(화면)과 서버(데이터 저장소)가 서로 대화하는 방식의 규칙입니다.
    예) 로그인 버튼을 누르면 → 앱이 서버에 "이 이메일/비밀번호 맞나요?" 라고 물어봄 → 서버가 "맞습니다, 입장하세요" 라고 답함

    **자주 나오는 용어**
    - GET: 데이터를 가져올 때 (조회)
    - POST: 데이터를 보낼 때 (등록, 로그인)
    - PUT/PATCH: 데이터를 수정할 때
    - DELETE: 데이터를 삭제할 때

    **응답 코드 (서버의 대답)**
    - ✅ 200: 성공
    - ❌ 400: 잘못된 요청 (입력값 오류)
    - 🔒 401: 로그인이 필요함
    - 🚫 403: 권한 없음
    - 💥 500: 서버 내부 오류

tags:
  - name: 인증
    description: 로그인, 로그아웃 관련
  - name: 사용자
    description: 회원 정보 관련
  - name: AI채팅
    description: AI와 대화 관련

paths:
  /auth/login:
    post:
      summary: "로그인"
      description: "이메일과 비밀번호로 로그인합니다. 성공하면 토큰(인증 열쇠)을 받습니다."
      tags: [인증]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  description: "가입한 이메일 주소"
                  example: "user@example.com"
                password:
                  type: string
                  description: "비밀번호"
                  example: "password123"
      responses:
        '200':
          description: "✅ 로그인 성공 — 토큰을 반환합니다"
          content:
            application/json:
              example:
                token: "eyJhbGci..."
                user:
                  id: 1
                  name: "홍길동"
                  email: "user@example.com"
        '401':
          description: "❌ 이메일 또는 비밀번호가 틀렸습니다"

  /auth/logout:
    post:
      summary: "로그아웃"
      description: "현재 로그인 상태를 종료합니다"
      tags: [인증]
      responses:
        '200':
          description: "✅ 로그아웃 성공"
        '401':
          description: "🔒 로그인 상태가 아닙니다"

  /users/me:
    get:
      summary: "내 정보 조회"
      description: "현재 로그인한 사용자의 정보를 가져옵니다"
      tags: [사용자]
      responses:
        '200':
          description: "✅ 조회 성공"
          content:
            application/json:
              example:
                id: 1
                name: "홍길동"
                email: "user@example.com"
                created_at: "2026-03-08T09:00:00"
        '401':
          description: "🔒 로그인이 필요합니다"
